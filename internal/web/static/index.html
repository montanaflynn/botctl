<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>botctl</title>
<style>
:root {
  --bg: #0d1117;
  --bg-surface: #161b22;
  --bg-hover: #1c2128;
  --bg-selected: #1f2937;
  --border: #30363d;
  --border-light: #3d444d;
  --text: #e6edf3;
  --text-dim: #7d8590;
  --text-muted: #484f58;
  --accent: #58a6ff;
  --green: #3fb950;
  --red: #f85149;
  --orange: #d29922;
  --purple: #bc8cff;
  --font: 'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font);
  font-size: 13px;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Header */
.header {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 16px;
}

.logo {
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 1px;
  color: var(--text);
}

.stats {
  display: flex;
  gap: 16px;
}

.stat {
  color: var(--text-dim);
  font-size: 12px;
}

.stat-value {
  color: var(--text);
  font-weight: 600;
}

/* Main Layout */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Bot Table */
.table-section {
  flex-shrink: 0;
  border-bottom: 1px solid var(--border);
}

.table-header {
  display: flex;
  align-items: center;
  padding: 8px 16px;
  gap: 12px;
}

.table-label {
  color: var(--text-muted);
  font-size: 12px;
}

.filter-input {
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-family: var(--font);
  font-size: 12px;
  padding: 2px 8px;
  width: 150px;
  outline: none;
}

.filter-input:focus {
  border-color: var(--accent);
}

.filter-input::placeholder {
  color: var(--text-muted);
}

table {
  width: 100%;
  border-collapse: collapse;
}

thead th {
  text-align: left;
  padding: 6px 16px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  cursor: pointer;
  user-select: none;
  border-bottom: 1px solid var(--border);
}

thead th:hover {
  color: var(--text);
}

thead th .sort-arrow {
  margin-left: 4px;
  font-size: 10px;
}

tbody tr {
  cursor: pointer;
  transition: background 0.1s;
}

tbody tr:hover {
  background: var(--bg-hover);
}

tbody tr.selected {
  background: var(--bg-selected);
}

tbody td {
  padding: 6px 16px;
  font-size: 13px;
  white-space: nowrap;
}

.status-badge {
  display: inline-block;
  padding: 1px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
}

.status-running {
  background: rgba(63, 185, 80, 0.15);
  color: var(--green);
}

.status-stopped {
  background: rgba(125, 133, 144, 0.15);
  color: var(--text-dim);
}

.cost-cell {
  color: var(--text-dim);
}

/* Log Panel */
.log-section {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-height: 0;
}

.log-header {
  display: flex;
  align-items: center;
  padding: 8px 16px;
  gap: 12px;
  flex-shrink: 0;
  border-bottom: 1px solid var(--border);
}

.log-label {
  color: var(--text-muted);
  font-size: 12px;
}

.log-bot-name {
  color: var(--accent);
  font-size: 12px;
  font-weight: 600;
}

.new-lines-badge {
  margin-left: auto;
  color: var(--orange);
  font-size: 11px;
  cursor: pointer;
  display: none;
}

.log-content {
  flex: 1;
  overflow-y: auto;
  padding: 8px 16px;
  font-size: 12px;
  line-height: 1.6;
}

.log-content::-webkit-scrollbar {
  width: 6px;
}

.log-content::-webkit-scrollbar-track {
  background: transparent;
}

.log-content::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 3px;
}

.log-empty {
  color: var(--text-muted);
  padding: 24px;
  text-align: center;
}

/* Log entry boxes */
.log-entry {
  margin-bottom: 4px;
}

.log-box {
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 10px;
  margin: 2px 0;
}

.log-box-label {
  color: var(--text-dim);
  font-weight: 600;
  font-size: 12px;
}

.log-box-body {
  color: var(--text);
  white-space: pre-wrap;
  word-break: break-word;
}

.log-text-line {
  color: var(--text);
  white-space: pre-wrap;
  word-break: break-word;
  padding: 0 2px;
}

/* Footer */
.footer {
  flex-shrink: 0;
  border-top: 1px solid var(--border);
  padding: 8px 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.message-input {
  flex: 1;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-family: var(--font);
  font-size: 12px;
  padding: 6px 10px;
  outline: none;
}

.message-input:focus {
  border-color: var(--accent);
}

.message-input::placeholder {
  color: var(--text-muted);
}

.message-input:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.btn {
  padding: 5px 12px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--bg-surface);
  color: var(--text);
  font-family: var(--font);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}

.btn:hover:not(:disabled) {
  background: var(--bg-hover);
  border-color: var(--border-light);
}

.btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.btn-start {
  color: var(--green);
  border-color: rgba(63, 185, 80, 0.3);
}

.btn-stop {
  color: var(--red);
  border-color: rgba(248, 81, 73, 0.3);
}

.btn-resume {
  color: var(--orange);
  border-color: rgba(210, 153, 34, 0.3);
}

.btn-delete {
  color: var(--red);
  border-color: rgba(248, 81, 73, 0.3);
}

.btn-send {
  color: var(--accent);
  border-color: rgba(88, 166, 255, 0.3);
}

.notify {
  font-size: 11px;
  color: var(--text-dim);
  margin-left: 8px;
  opacity: 0;
  transition: opacity 0.3s;
}

.notify.visible {
  opacity: 1;
}

.notify.error {
  color: var(--red);
}

/* Responsive */
@media (max-width: 700px) {
  .hide-mobile { display: none; }
  tbody td { padding: 6px 8px; }
  thead th { padding: 6px 8px; }
  .footer { flex-wrap: wrap; }
  .message-input { min-width: 100%; }
}

/* Empty state */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px 24px;
  color: var(--text-muted);
  gap: 8px;
}

.empty-state-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-dim);
}

/* Confirm dialog */
.confirm-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
}

.confirm-box {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px 24px;
  max-width: 360px;
  width: 90%;
}

.confirm-box p {
  margin-bottom: 16px;
  font-size: 13px;
}

.confirm-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
}

/* Resume dialog */
.resume-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
}

.resume-box {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px 24px;
  max-width: 320px;
  width: 90%;
}

.resume-box label {
  display: block;
  margin-bottom: 8px;
  font-size: 13px;
}

.resume-box input {
  width: 80px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-family: var(--font);
  font-size: 13px;
  padding: 4px 8px;
  outline: none;
  margin-bottom: 16px;
}

.resume-box input:focus {
  border-color: var(--accent);
}

.resume-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">BOTCTL</div>
    <div class="stats">
      <span class="stat">bots: <span class="stat-value" id="stat-bots">-</span></span>
      <span class="stat">runs: <span class="stat-value" id="stat-runs">-</span></span>
      <span class="stat">cost: <span class="stat-value" id="stat-cost">-</span></span>
    </div>
  </div>
</div>

<div class="main">
  <div class="table-section">
    <div class="table-header">
      <span class="table-label">&lt;bots&gt;</span>
      <input class="filter-input" id="filter" type="text" placeholder="filter...">
    </div>
    <table>
      <thead>
        <tr>
          <th data-col="name">Name <span class="sort-arrow" id="sort-name"></span></th>
          <th data-col="status">Status <span class="sort-arrow" id="sort-status"></span></th>
          <th data-col="pid" class="hide-mobile">PID <span class="sort-arrow" id="sort-pid"></span></th>
          <th data-col="runs" class="hide-mobile">Runs <span class="sort-arrow" id="sort-runs"></span></th>
          <th data-col="cost">Cost <span class="sort-arrow" id="sort-cost"></span></th>
          <th data-col="last_run">Last Run <span class="sort-arrow" id="sort-last_run"></span></th>
        </tr>
      </thead>
      <tbody id="bot-table"></tbody>
    </table>
    <div class="empty-state" id="empty-state" style="display:none">
      <div class="empty-state-title">No bots found</div>
      <div>Create a bot with: botctl create my-bot</div>
    </div>
  </div>

  <div class="log-section">
    <div class="log-header">
      <span class="log-label">&lt;logs&gt;</span>
      <span class="log-bot-name" id="log-bot-name"></span>
      <span class="new-lines-badge" id="new-lines-badge" title="Click to scroll to bottom"></span>
    </div>
    <div class="log-content" id="log-content">
      <div class="log-empty">select a bot to view logs</div>
    </div>
  </div>
</div>

<div class="footer">
  <input class="message-input" id="message-input" type="text" placeholder="message for the bot..." disabled>
  <button class="btn btn-send" id="btn-send" disabled>Send</button>
  <button class="btn btn-start" id="btn-start" disabled>Start</button>
  <button class="btn btn-stop" id="btn-stop" disabled>Stop</button>
  <button class="btn btn-resume" id="btn-resume" disabled>Resume</button>
  <button class="btn btn-delete" id="btn-delete" disabled>Delete</button>
  <span class="notify" id="notify"></span>
</div>

<!-- Confirm Delete Dialog -->
<div class="confirm-overlay" id="confirm-overlay" style="display:none">
  <div class="confirm-box">
    <p>Delete <strong id="confirm-name"></strong>? This cannot be undone.</p>
    <div class="confirm-actions">
      <button class="btn" id="confirm-cancel">Cancel</button>
      <button class="btn btn-delete" id="confirm-yes">Delete</button>
    </div>
  </div>
</div>

<!-- Resume Dialog -->
<div class="resume-overlay" id="resume-overlay" style="display:none">
  <div class="resume-box">
    <label>Resume <strong id="resume-name"></strong> for how many turns?</label>
    <input type="number" id="resume-turns" min="1" value="50">
    <div class="resume-actions">
      <button class="btn" id="resume-cancel">Cancel</button>
      <button class="btn btn-resume" id="resume-confirm">Resume</button>
    </div>
  </div>
</div>

<script>
(function() {
  'use strict';

  // State
  let bots = [];
  let selectedBot = null;
  let eventSource = null;
  let sortCol = 'last_run';
  let sortDir = 'desc';
  let filterText = '';
  let newLineCount = 0;
  let autoScroll = true;

  // Elements
  const $table = document.getElementById('bot-table');
  const $empty = document.getElementById('empty-state');
  const $filter = document.getElementById('filter');
  const $logContent = document.getElementById('log-content');
  const $logBotName = document.getElementById('log-bot-name');
  const $newLines = document.getElementById('new-lines-badge');
  const $msgInput = document.getElementById('message-input');
  const $btnSend = document.getElementById('btn-send');
  const $btnStart = document.getElementById('btn-start');
  const $btnStop = document.getElementById('btn-stop');
  const $btnResume = document.getElementById('btn-resume');
  const $btnDelete = document.getElementById('btn-delete');
  const $notify = document.getElementById('notify');
  const $statBots = document.getElementById('stat-bots');
  const $statRuns = document.getElementById('stat-runs');
  const $statCost = document.getElementById('stat-cost');

  // API helpers
  async function api(method, path, body) {
    const opts = { method, headers: {} };
    if (body) {
      opts.headers['Content-Type'] = 'application/json';
      opts.body = JSON.stringify(body);
    }
    const res = await fetch('/api' + path, opts);
    return res.json();
  }

  // Notification
  let notifyTimer = null;
  function notify(msg, isError) {
    $notify.textContent = msg;
    $notify.classList.toggle('error', !!isError);
    $notify.classList.add('visible');
    clearTimeout(notifyTimer);
    notifyTimer = setTimeout(() => $notify.classList.remove('visible'), 4000);
  }

  // Time ago
  function timeAgo(iso) {
    if (!iso) return '-';
    const d = new Date(iso);
    const secs = Math.floor((Date.now() - d.getTime()) / 1000);
    if (secs < 0) return 'just now';
    if (secs < 60) return secs + 's ago';
    const mins = Math.floor(secs / 60);
    if (mins < 60) return mins + 'm ago';
    const hours = Math.floor(mins / 60);
    if (hours < 24) {
      const m = mins % 60;
      return m > 0 ? hours + 'h ' + m + 'm ago' : hours + 'h ago';
    }
    const days = Math.floor(hours / 24);
    const h = hours % 24;
    return h > 0 ? days + 'd ' + h + 'h ago' : days + 'd ago';
  }

  // Sorting
  function compareBots(a, b) {
    let va, vb;
    switch (sortCol) {
      case 'name': va = a.name.toLowerCase(); vb = b.name.toLowerCase(); break;
      case 'status': va = a.status; vb = b.status; break;
      case 'pid': va = a.pid; vb = b.pid; break;
      case 'runs': va = a.runs; vb = b.runs; break;
      case 'cost': va = a.cost; vb = b.cost; break;
      case 'last_run': va = a.last_run || ''; vb = b.last_run || ''; break;
      default: return 0;
    }
    let cmp = 0;
    if (typeof va === 'string') cmp = va.localeCompare(vb);
    else cmp = va - vb;
    return sortDir === 'asc' ? cmp : -cmp;
  }

  // Render table
  function renderTable() {
    let filtered = bots;
    if (filterText) {
      const f = filterText.toLowerCase();
      filtered = bots.filter(b => b.name.toLowerCase().includes(f));
    }
    filtered.sort(compareBots);

    if (filtered.length === 0) {
      $table.innerHTML = '';
      $empty.style.display = 'flex';
      return;
    }
    $empty.style.display = 'none';

    $table.innerHTML = filtered.map(bot => {
      const cls = (selectedBot && selectedBot === bot.name) ? ' class="selected"' : '';
      const statusCls = bot.status === 'running' ? 'status-running' : 'status-stopped';
      return '<tr' + cls + ' data-name="' + bot.name + '">' +
        '<td>' + esc(bot.name) + '</td>' +
        '<td><span class="status-badge ' + statusCls + '">' + bot.status + '</span></td>' +
        '<td class="hide-mobile">' + (bot.pid || '-') + '</td>' +
        '<td class="hide-mobile">' + bot.runs + '</td>' +
        '<td class="cost-cell">$' + bot.cost.toFixed(2) + '</td>' +
        '<td>' + timeAgo(bot.last_run) + '</td>' +
        '</tr>';
    }).join('');
  }

  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  // Update header sort arrows
  function updateSortArrows() {
    ['name','status','pid','runs','cost','last_run'].forEach(col => {
      const el = document.getElementById('sort-' + col);
      if (col === sortCol) el.textContent = sortDir === 'asc' ? '\u25B2' : '\u25BC';
      else el.textContent = '';
    });
  }

  // Update action buttons
  function updateButtons() {
    const hasSel = !!selectedBot;
    $msgInput.disabled = !hasSel;
    $btnSend.disabled = !hasSel;
    $btnStart.disabled = !hasSel;
    $btnStop.disabled = !hasSel;
    $btnResume.disabled = !hasSel;
    $btnDelete.disabled = !hasSel;

    if (hasSel) {
      const bot = bots.find(b => b.name === selectedBot);
      if (bot) {
        const running = bot.status === 'running';
        $btnStart.textContent = running ? 'Start' : 'Start';
        $btnStart.disabled = running;
        $btnStop.disabled = !running;
        $msgInput.placeholder = 'message ' + bot.name + '...';
      }
    } else {
      $msgInput.placeholder = 'select a bot...';
    }
  }

  // Stats
  async function refreshStats() {
    try {
      const s = await api('GET', '/stats');
      $statBots.textContent = s.running_bots + '/' + s.total_bots;
      $statRuns.textContent = s.total_runs;
      $statCost.textContent = '$' + s.total_cost.toFixed(2);
    } catch(e) {}
  }

  // Refresh bots
  async function refreshBots() {
    try {
      const data = await api('GET', '/bots');
      bots = data || [];
      renderTable();
      updateButtons();
      refreshStats();
    } catch(e) {
      console.error('refresh failed:', e);
    }
  }

  // Select bot
  function selectBot(name) {
    if (selectedBot === name) return;
    selectedBot = name;
    renderTable();
    updateButtons();
    $logBotName.textContent = name;
    loadLogs(name);
  }

  // Log rendering
  function renderLogEntry(entry) {
    const kind = entry.kind;
    const lines = entry.lines;
    if (!lines || lines.length === 0) return '';

    // Check if first line is a tag (most structured entries)
    const first = lines[0];
    const isTag = first.startsWith('<') && first.includes('>');

    if (isTag || kind === 'run_header' || kind === 'cost' || kind === 'tool_use' ||
        kind === 'tool_result' || kind === 'tool_error' || kind === 'error' ||
        kind === 'warning' || kind === 'max_turns' || kind === 'sleep' ||
        kind === 'event' || kind === 'resume' || kind === 'feedback') {
      const label = esc(first);
      const body = lines.slice(1).filter(l => l !== '').map(l => esc(l)).join('\n');
      let html = '<div class="log-box kind-' + kind + '"><div class="log-box-label">' + label + '</div>';
      if (body) html += '<div class="log-box-body">' + body + '</div>';
      html += '</div>';
      return html;
    }

    // Plain text lines
    return lines.map(l => '<div class="log-text-line">' + esc(l) + '</div>').join('');
  }

  // Load initial logs
  async function loadLogs(name) {
    // Close existing SSE
    if (eventSource) {
      eventSource.close();
      eventSource = null;
    }

    $logContent.innerHTML = '<div class="log-empty">Loading...</div>';
    newLineCount = 0;
    $newLines.style.display = 'none';

    try {
      const entries = await api('GET', '/bots/' + encodeURIComponent(name) + '/logs');
      if (!entries || entries.length === 0) {
        $logContent.innerHTML = '<div class="log-empty">no logs yet</div>';
      } else {
        $logContent.innerHTML = entries.map(renderLogEntry).join('');
        $logContent.scrollTop = $logContent.scrollHeight;
      }

      // Get last entry ID for SSE
      let afterId = 0;
      if (entries && entries.length > 0) {
        afterId = entries[entries.length - 1].id;
      }

      // Start SSE stream
      autoScroll = true;
      const url = '/api/bots/' + encodeURIComponent(name) + '/logs/stream?after=' + afterId;
      eventSource = new EventSource(url);
      eventSource.onmessage = function(ev) {
        try {
          const entry = JSON.parse(ev.data);
          const html = renderLogEntry(entry);
          if (!html) return;

          // Remove "no logs" placeholder
          const empty = $logContent.querySelector('.log-empty');
          if (empty) empty.remove();

          const el = document.createElement('div');
          el.className = 'log-entry';
          el.innerHTML = html;
          $logContent.appendChild(el);

          if (isNearBottom()) {
            $logContent.scrollTop = $logContent.scrollHeight;
            newLineCount = 0;
            $newLines.style.display = 'none';
          } else {
            newLineCount++;
            $newLines.textContent = '+' + newLineCount + ' new';
            $newLines.style.display = 'inline';
          }
        } catch(e) {}
      };
      eventSource.onerror = function() {
        // Will auto-reconnect
      };
    } catch(e) {
      $logContent.innerHTML = '<div class="log-empty">failed to load logs</div>';
    }
  }

  function isNearBottom() {
    return $logContent.scrollHeight - $logContent.scrollTop - $logContent.clientHeight < 50;
  }

  // Actions
  async function doStart() {
    if (!selectedBot) return;
    try {
      const res = await api('POST', '/bots/' + encodeURIComponent(selectedBot) + '/start');
      if (res.ok) notify(res.message);
      else notify(res.error, true);
      refreshBots();
    } catch(e) { notify('start failed', true); }
  }

  async function doStop() {
    if (!selectedBot) return;
    try {
      const res = await api('POST', '/bots/' + encodeURIComponent(selectedBot) + '/stop');
      if (res.ok) notify(res.message);
      else notify(res.error, true);
      refreshBots();
    } catch(e) { notify('stop failed', true); }
  }

  async function doMessage() {
    if (!selectedBot) return;
    const msg = $msgInput.value.trim();
    if (!msg) return;
    $msgInput.value = '';
    try {
      const res = await api('POST', '/bots/' + encodeURIComponent(selectedBot) + '/message', { message: msg });
      if (res.ok) notify(res.message);
      else notify(res.error, true);
      refreshBots();
    } catch(e) { notify('message failed', true); }
  }

  async function doResume(turns) {
    if (!selectedBot) return;
    try {
      const res = await api('POST', '/bots/' + encodeURIComponent(selectedBot) + '/resume', { turns: turns });
      if (res.ok) notify(res.message);
      else notify(res.error, true);
      refreshBots();
    } catch(e) { notify('resume failed', true); }
  }

  async function doDelete(name) {
    try {
      const res = await api('DELETE', '/bots/' + encodeURIComponent(name));
      if (res.ok) {
        notify(res.message);
        if (selectedBot === name) {
          selectedBot = null;
          $logContent.innerHTML = '<div class="log-empty">select a bot to view logs</div>';
          $logBotName.textContent = '';
          if (eventSource) { eventSource.close(); eventSource = null; }
        }
      } else notify(res.error, true);
      refreshBots();
    } catch(e) { notify('delete failed', true); }
  }

  // Event listeners
  $table.addEventListener('click', function(e) {
    const row = e.target.closest('tr');
    if (row && row.dataset.name) selectBot(row.dataset.name);
  });

  document.querySelectorAll('thead th').forEach(th => {
    th.addEventListener('click', function() {
      const col = this.dataset.col;
      if (sortCol === col) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
      else { sortCol = col; sortDir = 'asc'; }
      updateSortArrows();
      renderTable();
    });
  });

  $filter.addEventListener('input', function() {
    filterText = this.value;
    renderTable();
  });

  $btnStart.addEventListener('click', doStart);
  $btnStop.addEventListener('click', doStop);

  $btnSend.addEventListener('click', doMessage);
  $msgInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doMessage();
  });

  $btnResume.addEventListener('click', function() {
    if (!selectedBot) return;
    document.getElementById('resume-name').textContent = selectedBot;
    // Try to use bot's max_turns as default
    const bot = bots.find(b => b.name === selectedBot);
    document.getElementById('resume-turns').value = (bot && bot.max_turns > 0) ? bot.max_turns : 50;
    document.getElementById('resume-overlay').style.display = 'flex';
    document.getElementById('resume-turns').focus();
  });

  document.getElementById('resume-cancel').addEventListener('click', function() {
    document.getElementById('resume-overlay').style.display = 'none';
  });

  document.getElementById('resume-confirm').addEventListener('click', function() {
    const turns = parseInt(document.getElementById('resume-turns').value, 10);
    document.getElementById('resume-overlay').style.display = 'none';
    if (turns > 0) doResume(turns);
  });

  document.getElementById('resume-turns').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      document.getElementById('resume-confirm').click();
    } else if (e.key === 'Escape') {
      document.getElementById('resume-overlay').style.display = 'none';
    }
  });

  $btnDelete.addEventListener('click', function() {
    if (!selectedBot) return;
    document.getElementById('confirm-name').textContent = selectedBot;
    document.getElementById('confirm-overlay').style.display = 'flex';
  });

  document.getElementById('confirm-cancel').addEventListener('click', function() {
    document.getElementById('confirm-overlay').style.display = 'none';
  });

  document.getElementById('confirm-yes').addEventListener('click', function() {
    const name = document.getElementById('confirm-name').textContent;
    document.getElementById('confirm-overlay').style.display = 'none';
    doDelete(name);
  });

  $newLines.addEventListener('click', function() {
    $logContent.scrollTop = $logContent.scrollHeight;
    newLineCount = 0;
    $newLines.style.display = 'none';
  });

  $logContent.addEventListener('scroll', function() {
    if (isNearBottom()) {
      newLineCount = 0;
      $newLines.style.display = 'none';
    }
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', function(e) {
    // Skip if typing in an input
    if (e.target.tagName === 'INPUT') return;

    if (e.key === 'Escape') {
      document.getElementById('confirm-overlay').style.display = 'none';
      document.getElementById('resume-overlay').style.display = 'none';
    }
  });

  // Init
  updateSortArrows();
  refreshBots();
  setInterval(refreshBots, 3000);
})();
</script>
</body>
</html>
